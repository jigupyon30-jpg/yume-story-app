<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title></title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/page.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar__logo">
                <span class="sidebar__logo-icon">
                    <i class="fa-solid fa-feather"></i>
                </span>
                <div>
                    <p class="sidebar__eyebrow">Yume Story</p>
                    <h1>夢小説メーカー</h1>
                </div>
            </div>

            <nav class="sidebar__nav">
                <button class="nav-button is-active" data-page="homePage">
                    <i class="fa-solid fa-house"></i>
                    ホーム
                </button>
                <button class="nav-button" data-page="projectPage">
                    <i class="fa-solid fa-book-open"></i>
                    作品
                </button>
                <button class="nav-button" data-page="editorPage">
                    <i class="fa-solid fa-pen-nib"></i>
                    エディタ
                </button>
                <button class="nav-button" data-page="previewPage">
                    <i class="fa-solid fa-eye"></i>
                    プレビュー
                </button>
            </nav>
        </aside>

        <main class="main">
            <header class="topbar">
                <div>
                    <p class="page-kicker">Creative writing studio</p>
                    <h2 id="pageTitle">ホーム</h2>
                </div>

                <button class="primary-button" id="openCreateProjectButton">
                    <i class="fa-solid fa-plus"></i>
                    新規作品
                </button>
            </header>

            <section class="page is-active" id="homePage">
                <div class="home-grid">
                    <article class="summary-card">
                        <p>登録作品</p>
                        <strong id="projectCount">0</strong>
                    </article>

                    <article class="summary-card">
                        <p>選択中の作品</p>
                        <strong id="currentProjectName">未選択</strong>
                    </article>
                </div>

                <section class="panel">
                    <div class="panel__header">
                        <h3>最近の作品</h3>
                    </div>
                    <div class="project-list" id="recentProjectList"></div>
                </section>
            </section>

            <section class="page" id="projectPage">
                <section class="panel">
                    <div class="panel__header">
                        <h3>作品一覧</h3>
                    </div>

                    <form class="project-form" id="projectForm">
                        <input type="hidden" id="projectId">
                        
                        <label class="form-field">
                            <span>作品タイトル</span>
                            <input type="text" id="projectTitleInput" placeholder="例：ミルクブラウンのお姫様">
                        </label>

                        <label class="form-field">
                            <span>ジャンル</span>
                            <select id="projectGenreInput">
                                <option value="紅一点">紅一点</option>
                                <option value="学パロ">学パロ</option>
                                <option value="社会人パロ">社会人パロ</option>
                                <option value="芸能界">芸能界</option>
                                <option value="その他">その他</option>
                            </select>
                        </label>

                        <label class="form-field">
                            <span>メモ</span>
                            <textarea id="projectMemoInput" placeholder="世界観、関係性、書きたい雰囲気など"></textarea>
                        </label>

                        <div class="form-actions">
                            <button type="submit" class="primary-button">
                                <i class="fa-solid fa-floppy-disk"></i>
                                保存
                            </button>
                            <button type="button" class="ghost-button" id="resetProjectFormButton">
                                リセット
                            </button>
                        </div>
                    </form>

                    <div class="project-list" id="projectList"></div>
                </section>
            </section>

            <section class="page" id="editorPage">
                <section class="panel">
                    <div class="panel__header">
                        <div>
                            <h3>本文エディタ</h3>
                            <p id="editorProjectLabel">作品を選択してください</p>
                        </div>
                    </div>

                    <form class="editor-form" id="textBlockForm">
                        <input type="hidden" id="blockId">

                        <label class="form-field">
                            <span>本文ブロック</span>
                            <textarea id="textBlockInput" placeholder="ここに本文を書く"></textarea>
                        </label>

                        <div class="form-actions">
                            <button type="submit" class="primary-button">
                                <i class="fa-solid fa-plus"></i>
                                本文ブロックを追加
                            </button>
                            <button type="button" class="ghost-button" id="resetBlockFormButton">
                                入力リセット
                            </button>
                        </div>
                    </form>

                    <!-- SNSブロック追加フォーム -->
                    <section class="sns-block-panel">
                        <div class="panel__header">
                            <div>
                                <h3>SNSブロック追加</h3>
                                <p>LINE / Instagram / DM / Twitter を本文の間に挿入できます</p>
                            </div>
                        </div>

                        <label class="form-field">
                            <span>ブロック種類</span>
                            <select id="snsBlockType">
                                <option value="line">LINE</option>
                                <option value="instagramPost">Instagram投稿</option>
                                <option value="instagramDm">Instagram DM</option>
                                <option value="twitter">Twitter</option>
                            </select>
                        </label>

                        <div id="snsDynamicForm"></div>

                        <div class="form-actions">
                            <button type="button" class="primary-button" id="addSnsBlockButton">
                                <i class="fa-solid fa-plus"></i>
                                SNSブロックを追加
                            </button>
                        </div>
                    </section>

                    <div class="block-list" id="blockList"></div>
                </section>
            </section>

            <section class="page" id="previewPage">
                <section class="preview-paper">
                    <div class="preview-header">
                        <p id="previewGenre">Genre</p>
                        <h3 id="previewTitle">作品を選択してください</h3>
                    </div>

                    <div class="preview-body" id="previewBody"></div>
                </section>
            </section>
        </main>
    </div>

    <script src="./js/storage.js"></script>
    <script src="./js/data.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/project.js"></script>
    <script src="./js/editor.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
